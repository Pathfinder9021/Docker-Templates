services:
  audiobookshelf:
    container_name: Audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:${AUDIOBOOKSHELf_VERSION:-latest}
    ports:
      - 6001:80
    user: ${PUID:-0}:${PGID:-0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${PATH_APPDATA}/audiobookshelf/config:/config
      - ${PATH_APPDATA}/audiobookshelf/metadata:/metadata
      - ${PATH_MEDIA}:/mnt/media/books
    networks:
      - app-audiobookshelf
    logging:
      driver: json-file
      options:
        max-size: 10m
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost || exit 1
      interval: 5m
      timeout: 3s
      start_period: 20s
      start_interval: 1s
    restart: unless-stopped

networks:
  app-audiobookshelf:
    name: app-audiobookshelf
    driver: bridge
