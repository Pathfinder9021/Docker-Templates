services:      
  nextcloud:
    container_name: Nextcloud
    image: nextcloud
    ports:
      - 8082:80
    user: ${PUID:-0}:${PGID:-0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USERNAME:-nextcloud}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - TRUSTED_PROXIES=${NEXTCLOUD_TRUSTED_PROXIES}
      - OVERWRITEHOST=${NEXTCLOUD_OVERWRITEHOST}
      - OVERWRITEPROTOCOL=https
      - POSTGRES_HOST=nextcloud-database
      - POSTGRES_DB=${NEXTCLOUD_DATABASE_SCHEMA:-nextcloud}
      - POSTGRES_USER=${NEXTCLOUD_DATABASE_USERNAME:--nextcloud}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DATABASE_PASSWORD} 
      - REDIS_HOST=nextcloud-redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${PATH_APPDATA}/nextcloud/html:/var/www/html:rw
      - ${PATH_APPDATA}/nextcloud/custom_apps:/var/www/html/custom_apps:rw
      - ${PATH_APPDATA}/nextcloud/config:/var/www/html/config:rw
      - ${PATH_APPDATA}/nextcloud/data:/var/www/html/data:rw
      - ${PATH_APPDATA}/nextcloud/themes:/var/www/html/themes:rw 
    networks:
      - app-nextcloud
    healthcheck:
      test: curl -f http://localhost:80/ || exit 1
    restart: unless-stopped
    depends_on:
      nextcloud-database:
        condition: service_started
      nextcloud-redis:
        condition: service_healthy
  
  nextcloud-cron:
    container_name: Nextcloud-CRON
    image: nextcloud:apache
    entrypoint: /cron.sh
    user: ${PUID:-0}:${PGID:-0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    volumes:
      - /etc/TZ:/etc/TZ:ro
      - /etc/localtime:/etc/localtime:ro
      - ${PATH_APPDATA}/nextcloud/config:/var/www/html/config:rw
      - ${PATH_APPDATA}/nextcloud/html:/var/www/html:rw
      - ${PATH_APPDATA}/nextcloud/custom_apps:/var/www/html/custom_apps:rw
      - ${PATH_APPDATA}/nextcloud/data:/var/www/html/data:rw
    networks:
      - app-nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-database:
        condition: service_started
      nextcloud-redis:
        condition: service_started

  nextcloud-database:
    container_name: Nextcloud-Database
    image: docker.io/library/postgres:latest
    user: ${PUID:-0}:${PGID:-0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - POSTGRES_DB=${NEXTCLOUD_DATABASE_SCHEMA:-nextcloud}
      - POSTGRES_USER=${NEXTCLOUD_DATABASE_USERNAME:-nextcloud}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DATABASE_PASSWORD}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${PATH_APPDATA}/nextcloud/database:/var/lib/postgresql/data
    networks:
      - app-nextcloud
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB:-nextcloud} -U $${POSTGRES_USER:-nextcloud}
      timeout: 5s
    restart: unless-stopped

  nextcloud-redis:
    container_name: Nextcloud-Redis
    hostname: nextcloud-redis
    image: redis
    user: ${PUID:-0}:${PGID:-0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${PATH_APPDATA}/nextcloud/redis:/data:rw
    networks:
      - app-nextcloud
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
    restart: unless-stopped

networks:
  app-nextcloud:
    name: app-nextcloud
    driver: bridge