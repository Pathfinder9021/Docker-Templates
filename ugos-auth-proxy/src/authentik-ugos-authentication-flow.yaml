- attrs:
    execution_logging: false
    expression: "\"\"\"\nauthentik Expression Policy: ugos-password-validation-policy\n\
      \nThis policy handles UGOS user authentication and auto-provisioning.\nCopy\
      \ this code to authentik: Customization -> Policies -> Create -> Expression\
      \ Policy\n\nBind to `ugos-password-deny-stage` with negate=True\n\"\"\"\n\n\
      import requests\nfrom authentik.core.models import User, Group\n\n# ==========\
      \ Configuration ==========\n# Change these values to match your environment\n\
      UGOS_AUTH_PROXY_URL = \"http://192.168.11.90:8180\"  # Your ugos-auth-proxy\
      \ address\nUSER_PATH = \"ugos\"                                 # Path for auto-provisioned\
      \ users\nDEFAULT_EMAIL_DOMAIN = \"gmail.com\"  # Default email domain\nUGOS_USERS_GROUP\
      \ = \"UGOS Users\"                    # Group for all UGOS users\n\n# UGOS group\
      \ -> authentik group mapping\nGROUP_MAP = {\n    \"admin\": \"admins\",\n  \
      \  \"family\": \"family\",\n}\n\n# ========== Get password from prompt_data\
      \ ==========\npassword = request.context.get(\"prompt_data\", {}).get(\"password\"\
      )\nif not password:\n    ak_message(\"Password is required\")\n    return False\n\
      \n# ========== Get pending_user from context ==========\npending_user = request.context.get(\"\
      pending_user\")\nif not pending_user:\n    ak_message(\"User identification\
      \ failed\")\n    return False\n\nusername = pending_user.username\n\n# ==========\
      \ Check if user is real (has pk) or fake (pretend_user_exists) ==========\n\
      user_is_fake = pending_user.pk is None\n\nif user_is_fake:\n    # User doesn't\
      \ exist in authentik - need to validate via UGOS and create\n\n    # ==========\
      \ Validate via UGOS Auth Proxy ==========\n    try:\n        validate_resp =\
      \ requests.post(\n            f\"{UGOS_AUTH_PROXY_URL}/validate\",\n       \
      \     json={\"username\": username, \"password\": password},\n            timeout=5,\n\
      \        )\n        validate_result = validate_resp.json()\n\n        if not\
      \ validate_result.get(\"valid\", False):\n            ak_message(\"Invalid password\"\
      )\n            return False\n    except Exception as e:\n        ak_message(f\"\
      Authentication service unavailable: {str(e)}\")\n        return False\n\n  \
      \  # ========== Get user info from UGOS ==========\n    try:\n        info_resp\
      \ = requests.get(\n            f\"{UGOS_AUTH_PROXY_URL}/user-info\",\n     \
      \       params={\"username\": username},\n            timeout=5,\n        )\n\
      \        user_info = info_resp.json()\n\n        if not user_info.get(\"exists\"\
      , False):\n            ak_message(\"User does not exist in UGOS\")\n       \
      \     return False\n    except Exception as e:\n        ak_message(f\"Failed\
      \ to get user info: {str(e)}\")\n        return False\n\n    # ========== Create\
      \ user in authentik ==========\n    try:\n        full_name = user_info.get(\"\
      full_name\", username)\n        if not full_name or full_name == username or\
      \ full_name == \"UGREEN USER\":\n            full_name = username.replace(\"\
      .\", \" \").replace(\"_\", \" \").title()\n\n        email = user_info.get(\"\
      email\", \"\")\n        if not email:\n            email = f\"{username}@{DEFAULT_EMAIL_DOMAIN}\"\
      \n\n        real_user = User.objects.create(\n            username=username,\n\
      \            name=full_name,\n            email=email,\n            path=USER_PATH,\n\
      \            attributes={\n                \"ugos_user\": True,\n          \
      \      \"ugos_uid\": user_info.get(\"uid\"),\n                \"ugos_gid\":\
      \ user_info.get(\"gid\"),\n                \"ugos_groups\": user_info.get(\"\
      groups\", []),\n                \"ugos_home\": user_info.get(\"home\"),\n  \
      \              \"auto_provisioned\": True,\n            },\n        )\n\n  \
      \      # Add to UGOS Users group\n        ugos_group, _ = Group.objects.get_or_create(name=UGOS_USERS_GROUP)\n\
      \        real_user.ak_groups.add(ugos_group)\n\n        # Map UGOS groups to\
      \ authentik groups\n        ugos_groups = user_info.get(\"groups\", [])\n  \
      \      for ugos_grp, ak_grp in GROUP_MAP.items():\n            if ugos_grp in\
      \ ugos_groups:\n                try:\n                    mapped_group = Group.objects.get(name=ak_grp)\n\
      \                    real_user.ak_groups.add(mapped_group)\n               \
      \ except Group.DoesNotExist:\n                    pass\n\n        real_user.save()\n\
      \n        # ========== Update flow context with real user ==========\n     \
      \   request.context[\"pending_user\"] = real_user\n\n        # Update flow_plan\
      \ context directly (required for UserLoginStage)\n        flow_plan = request.context.get(\"\
      flow_plan\")\n        if flow_plan and hasattr(flow_plan, \"context\"):\n  \
      \          flow_plan.context[\"pending_user\"] = real_user\n\n    except Exception\
      \ as e:\n        ak_message(f\"Failed to create user: {str(e)}\")\n        return\
      \ False\n\n    return True\n\nelse:\n    # User exists - check if UGOS user\
      \ or local\n    is_ugos_user = pending_user.attributes.get(\"ugos_user\", False)\n\
      \n    if not is_ugos_user:\n        # Local user - check authentik password\n\
      \        if pending_user.check_password(password):\n            return True\n\
      \        else:\n            ak_message(\"Invalid password\")\n            return\
      \ False\n\n    # UGOS user - validate via UGOS Auth Proxy\n    try:\n      \
      \  response = requests.post(\n            f\"{UGOS_AUTH_PROXY_URL}/validate\"\
      ,\n            json={\"username\": username, \"password\": password},\n    \
      \        timeout=5,\n        )\n        result = response.json()\n\n       \
      \ if result.get(\"valid\", False):\n            return True\n        else:\n\
      \            ak_message(\"Invalid password\")\n            return False\n  \
      \  except Exception as e:\n        ak_message(f\"Authentication service error:\
      \ {str(e)}\")\n        return False"
    name: ugos-password-validation-policy
