# UGOS Auth Proxy - PAM-based authentication for authentik SSO
#
# Standalone usage:
#   docker compose -f docker-compose.ugos-auth-proxy.yml up -d
#
# Or add to your main docker-compose.yml

services:
  ugos-auth-proxy:
    build: ./src
    container_name: UGOS-Auth-Proxy
    restart: always
    user: ${PUID:-0}:${PGID:0}
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - PORT=8080
    volumes:
      # IMPORTANT: Mount system files for PAM authentication and user info (read-only)
      - /etc/shadow:/etc/shadow:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
