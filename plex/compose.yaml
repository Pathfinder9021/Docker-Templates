services:
  plex:
    container_name: Plex
    hostname: Plex
    image: ghcr.io/linuxserver/plex:${PLEX_VERSION:-latest}
    # ports:
    #  - 32400:32400
    user: ${PUID:-0}:${PGID:0}
    environment: 
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - VERSION=public
      - PLEX_CLAIM=${PLEX_CLAIM_KEY:-''}
    devices:
      - /etc/TZ:/etc/TZ:ro
      - /etc/localtime:/etc/localtime:ro
      - /dev/bus/usb:/dev/bus/usb            # Map host USB bus into the container
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    volumes:
      - ${PATH_APPDATA}/plex/config:/config:rw
      - ${PATH_MEDIA}:/mnt/media/videos:rw
    network_mode: host
    mem_limit: 8g
    cpu_shares: 1024
    privileged: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:32400/web
    restart: unless-stopped
